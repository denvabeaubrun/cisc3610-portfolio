<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Gallery</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1 class="text-center my-4">My photo gallery</h1>
    <p class="text-center text-muted">A showcase of cat pictures using Bootstrap's grid system.</p>
  </div>
  <div class="container">
    <div class="row">

      <div class="col-md-4">
        <img src="cat1.jpg" class="img-fluid rounded" alt="Cat 1">
      </div>

      <div class="col-md-4">
        <img src="cat2.jpg" class="img-fluid rounded" alt="Cat 2">
      </div>

      <div class="col-md-4">
        <img src="cat3.jpg" class="img-fluid rounded" alt="Cat 3">
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
