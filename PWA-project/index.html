<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Sights</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a1a6e">
</head>
<body>
  <!-- HEADER -->
  <header class="app-header">
    <h1 class="app-title">
      🪐 Planet Sights
    </h1>
    <p class="app-subtitle">
      Travel through the solar system
    </p>
  </header>
  <!-- MENU -->
  <nav id="menu" class="planet-menu">
    <p>Loading...</p>
  </nav>
  <!-- MAIN STAGE -->
  <main class="stage">
    
    <!-- Planet Image -->
    <img id="planetImage"
         class="planet-bg"
         src=""
         alt="">

    <!-- Welcome Layout -->
    <div class="welcome-layout">

      <!-- Speech Bubble / Info Card -->
      <div class="info-card">

        <!-- INFO VIEW -->
        <div id="infoView" class="card-view">
          <p id="planetType" class="planet-type">
            PLANET
          </p>
          <h2 id="planetTitle" class="planet-title">
            Welcome
          </h2>
          <p id="planetDesc" class="planet-desc">
            Choose a destination to start exploring.
          </p>
          <button id="factsBtn"
                  class="card-btn"
                  style="display:none;">
            ✨ Show Facts
          </button>
        </div>

        <!-- FACTS VIEW -->
        <div id="factsView" class="card-view hidden">
          <h3 class="facts-heading">
            ✨ Fun Facts
          </h3>
          <ul id="factsList"></ul>
          <button id="listenBtn" class="card-btn">
            🔊 Listen
          </button>
          <button id="backBtn" class="card-btn">
            ← Back
          </button>
        </div>
      </div>

      <!-- Astronaut -->
      <img src="images/astronaut.png"
           class="welcome-astronaut"
           alt="Astronaut">
    </div>
  </main>

  <!-- APP SCRIPT -->
  <script src="app.js"></script>

  <!-- SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => {
            console.log('Service worker registered ✅');
          })
          .catch(err => {
            console.log('Service worker error ❌', err);
          });
      });
    }
  </script>
</body>
</html>
