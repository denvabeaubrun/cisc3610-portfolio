<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Sites</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a9396">
</head>

<body>
  <header class="app-header text-center py-5 text-white">
    <div class="container">
      <h1 class="app-title">🌌 Planet Sites</h1>
      <p class="app-subtitle">Your guide through the solar system</p>
    </div>
  </header>
  
  <nav class="text-center mb-4">
    <div id="menu"></div>
  </nav>

  <main class="container my-4">

    <div id="planetCarousel" class="carousel slide" data-bs-ride="carousel">

      <div class="carousel-inner" id="carousel-content">
       
      </div>

      <button class="carousel-control-prev" type="button"
        data-bs-target="#planetCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button"
        data-bs-target="#planetCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
