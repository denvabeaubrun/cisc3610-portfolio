<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Sights</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <h1 class="app-title">🪐 Planet Sights</h1>
    <p class="app-subtitle">Travel through the solar system</p>
  </header>

  <!-- MENU -->
  <nav id="menu" class="planet-menu">
    <p>Loading...</p>
  </nav>

  <!-- MAIN STAGE -->
  <main class="stage">
    
    <img id="planetImage" class="planet-bg" src="" alt="">
    
    <div class="text-overlay">
      <p id="planetType" class="planet-type">PLANET</p>
      <h2 id="planetTitle" class="planet-title">Welcome</h2>
      <p id="planetDesc" class="planet-desc">Choose a destination above to begin your journey.</p>
      <button id="listenBtn" class="listen-btn" style="display:none;">🔊 Listen</button>
      <button id="factsBtn" class="facts-btn" style="display:none;">✨ Show Facts</button>
    </div>
    
    <div id="factsPanel" class="facts-panel">
      <h3>Fun Facts</h3>
      <ul id="factsList"></ul>
      <button id="closeFacts" class="close-facts">✕</button>
    </div>
    
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
