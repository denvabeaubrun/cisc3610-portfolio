<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Sights</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <h1 class="app-title">🪐 Planet Sights</h1>
    <p class="app-subtitle">Travel through the solar system</p>
  </header>

  <!-- MENU -->
  <nav id="menu" class="planet-menu">
    <p>Loading...</p>
  </nav>

  <main class="stage">
    
    <!-- Planet image -->
    <img id="planetImage" class="planet-bg" src="" alt="">
    
    <!-- Card with two views: info & facts -->
    <div class="info-card">
      
      <!-- View 1: Planet info -->
      <div id="infoView" class="card-view">
        <p id="planetType" class="planet-type">PLANET</p>
        <h2 id="planetTitle" class="planet-title">Welcome</h2>
        <p id="planetDesc" class="planet-desc">Choose a destination above to begin your journey.</p>
        <button id="factsBtn" class="card-btn" style="display:none;">✨ Show Facts</button>
      </div>
      
      <!-- View 2: Facts -->
      <div id="factsView" class="card-view hidden">
        <h3 class="facts-heading">✨ Fun Facts</h3>
        <ul id="factsList"></ul>
        <button id="listenBtn" class="card-btn">🔊 Listen</button>
        <button id="backBtn" class="card-btn">← Back</button>
      </div>
      
    </div>
    
  </main>
