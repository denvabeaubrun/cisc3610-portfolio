<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <title>forms</title>  
</head> 
<body>
Your Name: <input type="text" name="name" required>
Email: <input type="email" name="email" required placeholder="Enter a valid email address">
Age: <input type="number" size="6" name="age" min="18" max="99" value="21"><br>
Satisfaction: <input type="range" size="2" name="satisfaction" min="1" max="5" value="3">
   Date: <input type="date" name="date" required>
</body>
</html>
